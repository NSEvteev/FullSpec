# Пример конфигурации логирования
# Инструкция: cp config/examples/logging.config.example.yaml config/logging.yaml

# Уровни логирования: trace, debug, info, warn, error, fatal
default_level: info

# Форматы вывода
formatters:
  json:
    type: json
    timestamp: true
    include:
      - timestamp
      - level
      - message
      - context
      - trace_id
      - user_id

  pretty:
    type: pretty
    colorize: true
    timestamp: true
    include:
      - timestamp
      - level
      - message

# Транспорты (куда писать логи)
transports:
  # Консоль
  console:
    enabled: true
    level: debug
    formatter: pretty

  # Файл - все логи
  file_all:
    enabled: true
    level: info
    formatter: json
    filename: ./logs/app.log
    max_size: 10mb
    max_files: 10
    compress: true

  # Файл - только ошибки
  file_errors:
    enabled: true
    level: error
    formatter: json
    filename: ./logs/errors.log
    max_size: 10mb
    max_files: 30
    compress: true

  # Sentry (для продакшена)
  sentry:
    enabled: false  # Включить в production
    level: error
    dsn: ${SENTRY_DSN}
    environment: ${NODE_ENV}
    sample_rate: 1.0

# Настройки по модулям
modules:
  database:
    level: warn
    sql_queries: false  # Включить в development

  http:
    level: info
    log_requests: true
    log_responses: false
    exclude_paths:
      - /health
      - /metrics

  auth:
    level: info
    mask_sensitive: true  # Скрывать пароли, токены

  external_api:
    level: info
    log_requests: true
    log_responses: true

# Фильтры (что НЕ логировать)
filters:
  exclude_messages:
    - "Connection pool exhausted"  # Пример: игнорировать временные проблемы

  exclude_paths:
    - /health
    - /metrics
    - /favicon.ico

# Контекст (дополнительная информация в логах)
context:
  include_env: true
  include_hostname: true
  include_process_id: true
  custom_fields:
    app_name: ${APP_NAME}
    app_version: ${APP_VERSION}
