name: Рефакторинг
description: Предложить рефакторинг кода без изменения функциональности
title: "[Refactor]: "
labels:
  - refactor
body:
  - type: textarea
    id: current
    attributes:
      label: Текущее состояние
      description: Опишите текущий код/архитектуру, который нужно отрефакторить
      placeholder: "Текущая реализация в модуле X..."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Предлагаемые изменения
      description: Какие изменения вы предлагаете?
      placeholder: "Отрефакторить используя паттерн Y..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Мотивация
      description: Почему нужен этот рефакторинг?
      placeholder: "Это улучшит поддерживаемость, потому что..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Область
      description: Какая часть кодовой базы затрагивается?
      multiple: true
      options:
        - Backend
        - Frontend
        - Database
        - Infrastructure
        - Tests
    validations:
      required: true

  - type: textarea
    id: related-docs
    attributes:
      label: Связанная документация
      description: "Файлы проекта для понимания контекста задачи. Формат: описание — путь. Если нет — напишите «Связанной документации нет»"
      placeholder: |
        - Стандарт меток — .github/.instructions/labels/standard-labels.md
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Зависимости
      description: "Issues, от которых зависит задача (например #123, #124). Если нет — напишите «Нет»"
      placeholder: "#123, #124 или Нет"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Этот рефакторинг не меняет функциональность
          required: true
        - label: Я учёл влияние на существующие тесты
          required: true
