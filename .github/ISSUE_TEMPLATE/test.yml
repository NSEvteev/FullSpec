name: Тесты
description: E2E, integration, load, smoke тесты
title: "[Test]: "
labels:
  - test
body:
  - type: textarea
    id: description
    attributes:
      label: Описание задачи
      description: Что нужно сделать?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Область
      description: Какая часть кодовой базы затрагивается?
      multiple: true
      options:
        - Backend
        - Frontend
        - Database
        - Infrastructure
    validations:
      required: true

  - type: textarea
    id: related-docs
    attributes:
      label: Связанная документация
      description: "Файлы проекта для понимания контекста задачи. Формат: описание — путь. Если нет — напишите «Связанной документации нет»"
      placeholder: |
        - Стандарт меток — .github/.instructions/labels/standard-labels.md
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Зависимости
      description: "Issues, от которых зависит задача (например #123, #124). Если нет — напишите «Нет»"
      placeholder: "#123, #124 или Нет"
    validations:
      required: true

  - type: checkboxes
    id: subtasks
    attributes:
      label: Подзадачи
      description: Разбейте задачу на части, если возможно
      options:
        - label: Подзадача 1
        - label: Подзадача 2
