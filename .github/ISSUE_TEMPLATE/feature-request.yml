name: Запрос фичи
description: Предложить новую функциональность или улучшение
title: "[Feature]: "
labels:
  - feature
  - priority:low
body:
  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Какую проблему решает эта фича?
      placeholder: "Меня раздражает когда..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
      description: Как должна работать эта фича?
      placeholder: "Должно работать так..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативы
      description: Какие другие решения вы рассматривали?

  - type: textarea
    id: related-docs
    attributes:
      label: Связанная документация
      description: "Файлы проекта для понимания контекста задачи. Формат: описание — путь. Если нет — напишите «Связанной документации нет»"
      placeholder: |
        - Стандарт меток — .github/.instructions/labels/standard-labels.md
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Зависимости
      description: "Issues, от которых зависит задача (например #123, #124). Если нет — напишите «Нет»"
      placeholder: "#123, #124 или Нет"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Я поискал похожие запросы фич
          required: true
        - label: Я готов помочь с реализацией
          required: false
