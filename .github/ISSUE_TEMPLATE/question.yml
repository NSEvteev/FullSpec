name: Вопрос
description: Задать вопрос по проекту
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        ## Перед тем как спросить

        Пожалуйста, проверьте документацию и существующие Issues.

  - type: textarea
    id: question
    attributes:
      label: Ваш вопрос
      description: Что вы хотите узнать?
      placeholder: "Как настроить..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Чего вы пытаетесь достичь? Это поможет дать лучший ответ.

  - type: textarea
    id: related-docs
    attributes:
      label: Связанная документация
      description: "Файлы проекта для понимания контекста вопроса. Формат: описание — путь. Если нет — напишите «Связанной документации нет»"
      placeholder: |
        - Стандарт меток — .github/.instructions/labels/standard-labels.md
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Зависимости
      description: "Связанные Issues (например #123, #124). Если нет — напишите «Нет»"
      placeholder: "#123, #124 или Нет"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Я проверил документацию
          required: true
        - label: Я поискал в существующих Issues
          required: true
