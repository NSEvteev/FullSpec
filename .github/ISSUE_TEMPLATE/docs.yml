name: Документация
description: Сообщить о проблеме в документации или предложить улучшение
title: "[Docs]: "
labels:
  - docs
  - low
body:
  - type: dropdown
    id: type
    attributes:
      label: Тип изменения
      description: Какое изменение документации нужно?
      options:
        - Исправить опечатку/ошибку
        - Добавить недостающую информацию
        - Улучшить ясность
        - Добавить пример
        - Другое
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Расположение
      description: Какой файл или раздел нужно изменить?
      placeholder: "README.md, раздел 'Установка'"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Опишите проблему или улучшение
      placeholder: "В инструкции по установке не хватает..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Предлагаемое изменение
      description: Если у вас есть конкретное предложение, опишите его здесь

  - type: textarea
    id: related-docs
    attributes:
      label: Связанная документация
      description: "Файлы проекта для понимания контекста задачи. Формат: описание — путь. Если нет — напишите «Связанной документации нет»"
      placeholder: |
        - Стандарт меток — .github/.instructions/labels/standard-labels.md
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Зависимости
      description: "Issues, от которых зависит задача (например #123, #124). Если нет — напишите «Нет»"
      placeholder: "#123, #124 или Нет"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Я проверил, что это не дубликат
          required: true
