name: Баг-репорт
description: Сообщить о баге или неожиданном поведении
title: "[Bug]: "
labels:
  - bug
  - priority:medium
body:
  - type: markdown
    attributes:
      value: |
        ## Спасибо за сообщение о баге!

        Пожалуйста, предоставьте как можно больше деталей.

  - type: textarea
    id: description
    attributes:
      label: Описание бага
      description: Чёткое и краткое описание проблемы
      placeholder: "При нажатии на X происходит Y вместо Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Как воспроизвести проблему?
      placeholder: |
        1. Перейти в '...'
        2. Нажать на '...'
        3. Увидеть ошибку
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия
      description: Какую версию вы используете?
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Окружение
      description: Где возникла проблема?
      options:
        - Production
        - Staging
        - Local
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: Вставьте релевантные логи
      render: bash

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Я поискал похожие Issues
          required: true
        - label: Я предоставил всю необходимую информацию
          required: true
