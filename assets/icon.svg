<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Chain: 4 nodes in 2x2 grid -->
  <g transform="translate(128, 128)">
    <!-- Connecting lines -->
    <line x1="-52" y1="-52" x2="52" y2="-52" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="52" y1="-52" x2="52" y2="52" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="52" y1="52" x2="-52" y2="52" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-52" y1="52" x2="-52" y2="-52" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

    <!-- Diagonal -->
    <line x1="-52" y1="-52" x2="52" y2="52" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

    <!-- Node 1: Discussion (magnifier) -->
    <circle cx="-52" cy="-52" r="36" fill="white" opacity="0.2"/>
    <circle cx="-52" cy="-52" r="24" fill="white"/>
    <circle cx="-55" cy="-55" r="8" stroke="#4F46E5" stroke-width="3" fill="none"/>
    <line x1="-49.5" y1="-49.5" x2="-44" y2="-44" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>

    <!-- Node 2: Design (pencil) -->
    <circle cx="52" cy="-52" r="36" fill="white" opacity="0.2"/>
    <circle cx="52" cy="-52" r="24" fill="white"/>
    <line x1="46" y1="-46" x2="58.5" y2="-58.5" stroke="#5B21B6" stroke-width="3" stroke-linecap="round"/>
    <line x1="44.5" y1="-47.5" x2="47.5" y2="-44.5" stroke="#5B21B6" stroke-width="3" stroke-linecap="round"/>

    <!-- Node 3: Dev (code brackets) -->
    <circle cx="52" cy="52" r="36" fill="white" opacity="0.2"/>
    <circle cx="52" cy="52" r="24" fill="white"/>
    <path d="M48,44 L42,52 L48,60" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M56,44 L62,52 L56,60" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Node 4: Tests (flask) -->
    <circle cx="-52" cy="52" r="36" fill="white" opacity="0.2"/>
    <circle cx="-52" cy="52" r="24" fill="white"/>
    <line x1="-56" y1="44" x2="-48" y2="44" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
    <line x1="-55" y1="44" x2="-58" y2="56" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
    <line x1="-49" y1="44" x2="-46" y2="56" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
    <line x1="-58" y1="56" x2="-46" y2="56" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
