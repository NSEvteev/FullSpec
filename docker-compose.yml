# Docker Compose для локальной разработки
# Запуск: docker-compose up

version: '3.8'

services:
  # ===========================================
  # Frontend (Web UI)
  # ===========================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api-gateway
    networks:
      - app-network

  # ===========================================
  # Backend Services
  # ===========================================

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
      - AUTH_SERVICE_URL=http://auth:8001
      - USERS_SERVICE_URL=http://users:8002
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - auth
      - users
      - redis
    networks:
      - app-network

  # Auth Service
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth
    ports:
      - "8001:8001"
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8001
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/auth_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_ACCESS_TOKEN_EXPIRES=15m
      - JWT_REFRESH_TOKEN_EXPIRES=7d
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # Users Service
  users:
    build:
      context: ./services/users
      dockerfile: Dockerfile
    container_name: users
    ports:
      - "8002:8002"
    volumes:
      - ./services/users:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8002
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/users_db
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth:8001
      - STORAGE_TYPE=local
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # ===========================================
  # Databases & Cache
  # ===========================================

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_MULTIPLE_DATABASES=auth_db,users_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================
  # Development Tools (Опционально)
  # ===========================================

  # Mailhog для тестирования отправки email
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - app-network

  # Redis Commander для просмотра Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - app-network

  # PgAdmin для управления PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres-data:
  redis-data:

# ===========================================
# Networks
# ===========================================
networks:
  app-network:
    driver: bridge
