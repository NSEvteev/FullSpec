# Docker Compose — Test environment
# Изолированные зависимости для integration/e2e тестов
# Стандарт: platform/.instructions/standard-docker.md § 8

services:
  postgres-test:
    image: postgres:16-alpine
    restart: "no"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myapp}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  rabbitmq-test:
    image: rabbitmq:3-management-alpine
    restart: "no"
    ports:
      - "5673:5672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
    name: myapp-test
